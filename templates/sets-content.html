    <section class="breadcrumbs">
      <div class="container">
        <ol class="breadcrumb">
          <li><a href="./">Home</a></li>
          <li class="active">Set Database</li>
        </ol>
      </div>
    </section>
    <section class="p-y-80">
      <div class="container">
        <div class="heading">
          <i class="fa fa-cubes"></i>
          <h2>Set Database</h2>
          <p>Browse {{setCount}} armour and weapon sets from the LotRO Companion database.</p>
        </div>

        <!-- Filters -->
        <div class="row m-b-30">
          <div class="col-sm-6 col-md-4 m-b-15">
            <label class="item-filter-label">Pieces</label>
            <select id="filter-pieces" class="form-control item-filter-select">
              <option value="">All Sizes</option>
              <option value="2">2-piece</option>
              <option value="3">3-piece</option>
              <option value="4">4-piece</option>
              <option value="5">5-piece</option>
              <option value="6">6-piece</option>
              <option value="7">7-piece</option>
              <option value="8">8+ pieces</option>
            </select>
          </div>
          <div class="col-sm-6 col-md-4 m-b-15">
            <label class="item-filter-label">&nbsp;</label>
            <button id="filter-reset" class="btn btn-sm btn-default btn-block">Reset Filters</button>
          </div>
        </div>

        <!-- Sets Table -->
        <div class="table-responsive">
          <table id="sets-table" class="table table-striped table-hover" style="width:100%">
            <thead>
              <tr>
                <th>Name</th>
                <th>Item Level</th>
                <th>Pieces</th>
                <th>Bonuses</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- Set Detail Modal -->
    <div class="modal fade" id="set-modal" tabindex="-1" role="dialog">
      <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content item-modal-content">
          <div class="modal-header item-modal-header">
            <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            <h4 class="modal-title" id="set-modal-title"></h4>
          </div>
          <div class="modal-body" id="set-modal-body"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-sm btn-primary" data-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>
