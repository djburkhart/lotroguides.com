                <div class="col-12 col-sm-6 col-md-3">
                  <div class="card card-widget">
                    <div class="card-img">
                      <a href="{{url}}">
                        <img src="{{image}}" alt="{{title}}">
                      </a>
                    </div>
                    <div class="card-block">
                      <h4 class="card-title">
                        <a href="{{url}}">{{title}}</a>
                      </h4>
                      <div class="card-meta">
                        <span><i class="fa fa-clock-o"></i> {{date}}</span>
                        <span><i class="fa fa-comment-o"></i> <span data-cusdis-count-page-id="{{slug}}">0</span></span>
                      </div>
                      <p>{{excerpt}}</p>
                      <a href="{{url}}" class="btn btn-primary btn-rounded btn-sm card-read-more">Read More</a>
                    </div>
                  </div>
                </div>
