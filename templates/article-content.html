    <section class="breadcrumbs">
      <div class="container">
        <ol class="breadcrumb">
          <li><a href="../">Home</a></li>
          <li><a href="{{categoryUrl}}">{{category}}</a></li>
          <li class="active">{{title}}</li>
        </ol>
      </div>
    </section>
    <section>
      <div class="container">
        <div class="row">
          <div class="col-lg-1 hidden-md-down">
            <div class="widget widget-share" data-fixed="widget">
              <div class="widget-block">
                <span>Share</span>
                <a class="btn btn-social btn-facebook btn-circle" href="https://www.facebook.com/sharer/sharer.php?u={{articleUrl}}" target="_blank" rel="noopener noreferrer" data-toggle="tooltip" title="Share on Facebook" data-placement="right" role="button">
                  <i class="fa fa-facebook"></i>
                </a>
                <a class="btn btn-social btn-twitter btn-circle" href="https://twitter.com/intent/tweet?url={{articleUrl}}&text={{encodedTitle}}" target="_blank" rel="noopener noreferrer" data-toggle="tooltip" title="Share on Twitter" data-placement="right" role="button">
                  <i class="fa fa-twitter"></i>
                </a>
                <a class="btn btn-social btn-reddit btn-circle" href="https://www.reddit.com/submit?url={{articleUrl}}&title={{encodedTitle}}" target="_blank" rel="noopener noreferrer" data-toggle="tooltip" title="Share on Reddit" data-placement="right" role="button">
                  <i class="fa fa-reddit"></i>
                </a>
              </div>
            </div>
          </div>
          <div class="col-lg-10">
            <div class="post post-single">
              <h2 class="post-title">{{title}}</h2>
              <div class="post-meta">
                <span><i class="fa fa-clock-o"></i> {{date}}</span>
                <span><i class="fa fa-user"></i> {{author}}</span>
              </div>
              <div class="post-content lotro-article">
                {{content}}
              </div>
            </div>
            <div class="post-actions">
              <div class="post-tags">
                {{tags}}
              </div>
              <div class="social-share">
                <a class="btn btn-social btn-facebook btn-circle" href="https://www.facebook.com/sharer/sharer.php?u={{articleUrl}}" target="_blank" rel="noopener noreferrer" data-toggle="tooltip" title="Share on Facebook" data-placement="bottom" role="button">
                  <i class="fa fa-facebook"></i>
                </a>
                <a class="btn btn-social btn-twitter btn-circle" href="https://twitter.com/intent/tweet?url={{articleUrl}}&text={{encodedTitle}}" target="_blank" rel="noopener noreferrer" data-toggle="tooltip" title="Share on Twitter" data-placement="bottom" role="button">
                  <i class="fa fa-twitter"></i>
                </a>
                <a class="btn btn-social btn-reddit btn-circle" href="https://www.reddit.com/submit?url={{articleUrl}}&title={{encodedTitle}}" target="_blank" rel="noopener noreferrer" data-toggle="tooltip" title="Share on Reddit" data-placement="bottom" role="button">
                  <i class="fa fa-reddit"></i>
                </a>
              </div>
            </div>
            <div class="post-related">
              <h6 class="subtitle">Related Posts</h6>
              <div class="row">
                {{relatedPosts}}
              </div>
            </div>
            {{comments}}
          </div>
        </div>
      </div>
    </section>
    <script>
    (function(){
      /* ── GA4 share event + per-platform custom events ── */
      var buttons = document.querySelectorAll('.btn-social');
      var pageTitle = document.querySelector('.post-title');
      var title = pageTitle ? pageTitle.textContent.trim() : document.title;
      buttons.forEach(function(btn){
        btn.addEventListener('click', function(){
          var method;
          if(btn.classList.contains('btn-facebook')) method='facebook';
          else if(btn.classList.contains('btn-twitter')) method='x';
          else if(btn.classList.contains('btn-reddit')) method='reddit';
          else return;
          window.dataLayer=window.dataLayer||[];
          window.dataLayer.push({
            event: 'share',
            method: method,
            content_type: 'article',
            item_id: window.location.pathname
          });
          window.dataLayer.push({
            event: 'share_' + method,
            share_platform: method,
            share_url: btn.href,
            share_title: title
          });
        });
      });

      /* ── GA4 tutorial_begin (guide page load) ── */
      var isGuide = window.location.pathname.indexOf('/guides/') !== -1;
      if(isGuide){
        window.dataLayer=window.dataLayer||[];
        window.dataLayer.push({event:'tutorial_begin'});

        /* ── GA4 tutorial_complete (scroll to article bottom) ── */
        var postContent = document.querySelector('.post-content');
        if(postContent){
          var fired = false;
          var observer = new IntersectionObserver(function(entries){
            if(entries[0].isIntersecting && !fired){
              fired = true;
              window.dataLayer.push({event:'tutorial_complete'});
              observer.disconnect();
            }
          }, {threshold: 0.5});
          var lastChild = postContent.lastElementChild || postContent;
          observer.observe(lastChild);
        }
      }
    })();
    </script>
