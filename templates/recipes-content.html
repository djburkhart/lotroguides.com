    <section class="breadcrumbs">
      <div class="container">
        <ol class="breadcrumb">
          <li><a href="./">Home</a></li>
          <li class="active">Recipe Database</li>
        </ol>
      </div>
    </section>
    <section class="p-y-80">
      <div class="container">
        <div class="heading">
          <i class="fa fa-flask"></i>
          <h2>Recipe Database</h2>
          <p>Browse {{recipeCount}} crafting recipes across {{professionCount}} professions. Click any recipe for full ingredient details.</p>
        </div>

        <!-- Filters -->
        <div class="row m-b-30">
          <div class="col-sm-6 col-md-3 m-b-15">
            <label class="item-filter-label">Profession</label>
            <select id="filter-profession" class="form-control item-filter-select">
              <option value="">All Professions</option>
            </select>
          </div>
          <div class="col-sm-6 col-md-3 m-b-15">
            <label class="item-filter-label">Tier</label>
            <select id="filter-tier" class="form-control item-filter-select">
              <option value="">All Tiers</option>
            </select>
          </div>
          <div class="col-sm-6 col-md-3 m-b-15">
            <label class="item-filter-label">Category</label>
            <select id="filter-category" class="form-control item-filter-select">
              <option value="">All Categories</option>
            </select>
          </div>
          <div class="col-sm-6 col-md-3 m-b-15">
            <label class="item-filter-label">&nbsp;</label>
            <button id="filter-reset" class="btn btn-sm btn-default btn-block">Reset Filters</button>
          </div>
        </div>

        <!-- Recipes Table -->
        <div class="table-responsive">
          <table id="recipes-table" class="table table-striped table-hover" style="width:100%">
            <thead>
              <tr>
                <th>Recipe</th>
                <th>Profession</th>
                <th>Tier</th>
                <th>Category</th>
                <th>XP</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- Recipe Detail Modal -->
    <div class="modal fade" id="recipe-modal" tabindex="-1" role="dialog">
      <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content item-modal-content">
          <div class="modal-header item-modal-header">
            <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            <h4 class="modal-title" id="recipe-modal-title"></h4>
          </div>
          <div class="modal-body" id="recipe-modal-body"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-sm btn-primary" data-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>
