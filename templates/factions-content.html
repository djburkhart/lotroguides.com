    <section class="breadcrumbs">
      <div class="container">
        <ol class="breadcrumb">
          <li><a href="./">Home</a></li>
          <li class="active">Reputation Factions</li>
        </ol>
      </div>
    </section>
    <section class="p-y-80">
      <div class="container">
        <div class="heading">
          <i class="fa fa-star"></i>
          <h2>Reputation Factions</h2>
          <p>Browse {{factionCount}} reputation factions. Click any faction to view tier requirements and LOTRO Point rewards.</p>
        </div>

        <!-- Filters -->
        <div class="row m-b-30">
          <div class="col-sm-6 col-md-4 m-b-15">
            <label class="item-filter-label">Region</label>
            <select id="filter-category" class="form-control item-filter-select">
              <option value="">All Regions</option>
            </select>
          </div>
          <div class="col-sm-6 col-md-4 m-b-15">
            <label class="item-filter-label">&nbsp;</label>
            <button id="filter-reset" class="btn btn-sm btn-default btn-block">Reset Filters</button>
          </div>
        </div>

        <!-- Factions Table -->
        <div class="table-responsive">
          <table id="factions-table" class="table table-striped table-hover" style="width:100%">
            <thead>
              <tr>
                <th>Faction</th>
                <th>Region</th>
                <th>Tiers</th>
                <th>LP Total</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- Faction Detail Modal -->
    <div class="modal fade" id="faction-modal" tabindex="-1" role="dialog">
      <div class="modal-dialog" role="document">
        <div class="modal-content item-modal-content">
          <div class="modal-header item-modal-header">
            <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            <h4 class="modal-title" id="faction-modal-title"></h4>
          </div>
          <div class="modal-body" id="faction-modal-body"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-sm btn-primary" data-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>
